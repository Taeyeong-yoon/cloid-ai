<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코딩을 몰라도 AI 플랫폼을 만들 수 있습니다</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Noto Serif KR','Georgia',serif;background:#1a1a2e;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#2d1b69 0%,#1a1a2e 60%);}

/* ── Book Container ── */
.scene{perspective:3000px;width:100%;display:flex;justify-content:center;align-items:center;}
.book-wrap{position:relative;width:860px;height:560px;}

/* ── Book shadow ── */
.book-wrap::after{content:'';position:absolute;bottom:-30px;left:5%;right:5%;height:40px;background:rgba(0,0,0,0.5);filter:blur(20px);border-radius:50%;z-index:0;}

/* ── Pages ── */
.book{position:relative;width:860px;height:560px;transform-style:preserve-3d;filter:drop-shadow(0 20px 50px rgba(0,0,0,0.7));}

.spread{position:absolute;inset:0;display:flex;border-radius:4px 12px 12px 4px;}

/* Paper texture pages */
.page-left,.page-right{
  height:100%;overflow:hidden;
  background:linear-gradient(180deg,#fdf8f0 0%,#faf4e8 100%);
}
.page-left{
  width:50%;border-radius:4px 0 0 4px;
  border-right:1px solid #ddd0b8;
  box-shadow:inset -8px 0 20px rgba(0,0,0,0.08);
}
.page-right{
  width:50%;border-radius:0 12px 12px 0;
  box-shadow:inset 8px 0 20px rgba(0,0,0,0.06);
}

/* Spine */
.spine{position:absolute;left:50%;top:0;transform:translateX(-50%);width:14px;height:100%;background:linear-gradient(90deg,#c8a96e,#e8c97e,#c8a96e);z-index:20;box-shadow:0 0 12px rgba(0,0,0,0.3);}
.spine::before{content:'';position:absolute;left:3px;top:10px;right:3px;bottom:10px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.1),transparent);}

/* ── Page Flip Layer ── */
.flip-layer{
  position:absolute;right:0;top:0;width:50%;height:100%;
  transform-style:preserve-3d;transform-origin:left center;
  transition:transform 0.85s cubic-bezier(0.645,0.045,0.355,1);
  z-index:30;
}
.flip-layer.go-forward{transform:rotateY(-180deg);}
.flip-layer.go-backward{transform:rotateY(0deg);}

.flip-front,.flip-back{
  position:absolute;inset:0;backface-visibility:hidden;
  background:linear-gradient(180deg,#fdf8f0 0%,#faf4e8 100%);
  border-radius:0 12px 12px 0;
  overflow:hidden;
}
.flip-back{
  transform:rotateY(180deg);
  border-radius:4px 0 0 4px;
  border-right:1px solid #ddd0b8;
  box-shadow:inset -8px 0 20px rgba(0,0,0,0.08);
}

/* ── Page Content Styles ── */
.page-inner{padding:40px 36px;height:100%;display:flex;flex-direction:column;position:relative;}
.page-inner.right-inner{padding:40px 36px;}

.page-num{position:absolute;bottom:18px;font-size:11px;color:#a0916e;letter-spacing:1px;font-style:italic;}
.page-num.left{left:36px;}
.page-num.right{right:36px;}

.chapter-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c8a040;margin-bottom:10px;}
.page-title{font-size:22px;font-weight:700;color:#2c1810;line-height:1.3;margin-bottom:16px;font-family:'Georgia',serif;}
.page-body{font-size:13px;color:#4a3728;line-height:1.85;flex:1;}
.page-body p{margin-bottom:12px;}
.page-body strong{color:#2c1810;font-weight:700;}

.divider{width:40px;height:2px;background:#c8a040;margin:12px 0;}

/* ── Cover ── */
.cover-spread{background:linear-gradient(135deg,#1a0a3e 0%,#0f0a2e 50%,#1a0a3e 100%)!important;border-radius:4px 12px 12px 4px;}
.cover-left{
  width:50%;height:100%;
  background:linear-gradient(160deg,#2d1060 0%,#1a0a3e 100%);
  border-radius:4px 0 0 4px;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(255,255,255,0.05);
  overflow:hidden;position:relative;
}
.cover-left::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 40%,rgba(180,120,255,0.15),transparent 60%);
}
.cover-atom{font-size:120px;opacity:0.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:spin 20s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.cover-badge{
  position:relative;z-index:1;text-align:center;
  background:rgba(255,255,255,0.05);border:1px solid rgba(180,120,255,0.3);
  border-radius:12px;padding:24px 20px;margin:20px;
}
.cover-badge .sub{font-size:11px;color:#a78bfa;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
.cover-badge .big{font-size:48px;color:#f0e8ff;font-weight:900;line-height:1;}
.cover-badge .desc{font-size:12px;color:#c4b5fd;margin-top:8px;}

.cover-right{
  width:50%;height:100%;
  background:linear-gradient(160deg,#1a0a3e 0%,#0f1040 100%);
  border-radius:0 12px 12px 0;
  display:flex;flex-direction:column;justify-content:center;padding:50px 44px;
  position:relative;overflow:hidden;
}
.cover-right::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 60%,rgba(99,102,241,0.1),transparent 60%);}
.cover-main-title{font-size:26px;font-weight:800;color:#f0e8ff;line-height:1.35;margin-bottom:20px;position:relative;z-index:1;}
.cover-main-title span{color:#c084fc;}
.cover-subtitle{font-size:13px;color:#a78bfa;line-height:1.7;margin-bottom:28px;position:relative;z-index:1;}
.cover-tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#c084fc;margin:3px 4px 3px 0;position:relative;z-index:1;}
.cover-footer{position:absolute;bottom:28px;left:44px;right:44px;z-index:1;}
.cover-footer p{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;}

/* ── Highlight Box ── */
.hl-box{background:linear-gradient(135deg,#fff8e8,#fff3d4);border-left:4px solid #c8a040;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:12.5px;color:#3a2810;}
.hl-box strong{color:#8b5e08;}

/* ── Prompt Block ── */
.prompt-block{background:#1e1e2e;border-radius:10px;padding:16px;margin:12px 0;border:1px solid rgba(180,120,255,0.2);}
.prompt-block .pb-label{font-size:10px;color:#7c6aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:monospace;}
.prompt-block .pb-text{font-size:11.5px;color:#c9c0e8;line-height:1.7;font-family:'Consolas',monospace;white-space:pre-wrap;}

/* ── Role Card ── */
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.role-card{background:rgba(200,160,64,0.08);border:1px solid rgba(200,160,64,0.2);border-radius:8px;padding:10px 12px;}
.role-card .rc-name{font-size:11px;font-weight:700;color:#c8a040;margin-bottom:3px;}
.role-card .rc-role{font-size:10.5px;color:#6a5040;}
.role-card .rc-work{font-size:10px;color:#8a7060;margin-top:4px;line-height:1.5;}

/* ── Inspector Card ── */
.inspector-list{margin:8px 0;}
.inspector-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #e8dcc8;}
.inspector-item:last-child{border:none;}
.insp-icon{font-size:22px;flex-shrink:0;}
.insp-info .insp-name{font-size:12px;font-weight:700;color:#2c1810;}
.insp-info .insp-role{font-size:11px;color:#7a6858;margin-top:2px;}
.insp-info .insp-task{font-size:11px;color:#5a4838;margin-top:4px;line-height:1.5;}

/* ── Phase Table ── */
.phase-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px;}
.phase-table th{background:#2c1810;color:#f0e0c0;padding:8px 10px;text-align:left;font-weight:600;}
.phase-table td{padding:8px 10px;border-bottom:1px solid #e8dcc8;color:#4a3728;vertical-align:top;}
.phase-table tr:hover td{background:#fdf0e0;}
.tag-claude{background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.tag-codex{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}

/* ── Step Flow ── */
.flow-steps{margin:10px 0;}
.flow-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #eee0cc;}
.flow-step:last-child{border:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:#c8a040;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:12px;color:#4a3728;line-height:1.6;}
.step-text strong{color:#2c1810;}

/* ── Back Cover ── */
.back-cover{background:linear-gradient(135deg,#0f0a2e 0%,#1a0a3e 100%)!important;border-radius:4px 12px 12px 4px!important;display:flex;align-items:center;justify-content:center;}
.bc-inner{text-align:center;padding:40px;color:rgba(255,255,255,0.6);}
.bc-inner .bc-title{font-size:18px;color:#c084fc;margin-bottom:12px;}
.bc-inner .bc-url{font-size:13px;color:#7c6aaa;margin-top:16px;}

/* ── TOC ── */
.toc-list{list-style:none;margin:10px 0;}
.toc-list li{display:flex;align-items:baseline;gap:0;padding:7px 0;border-bottom:1px dotted #ddd0b8;font-size:12.5px;color:#4a3728;}
.toc-list li .toc-ch{width:80px;color:#c8a040;font-size:11px;font-weight:700;flex-shrink:0;}
.toc-list li .toc-title{flex:1;}
.toc-list li .toc-pg{color:#a0916e;font-size:11px;margin-left:8px;}

/* ── Navigation ── */
.nav-area{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:20px;z-index:100;}
.nav-btn{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:18px;
  transition:all 0.25s;display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover:not(:disabled){background:rgba(180,120,255,0.3);border-color:rgba(180,120,255,0.5);transform:scale(1.08);}
.nav-btn:disabled{opacity:0.2;cursor:not-allowed;}
.nav-info{text-align:center;min-width:80px;}
.nav-info .spread-num{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.nav-info .spread-title{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;}

/* ── Corner Turn Hint ── */
.corner-hint{
  position:absolute;bottom:0;right:0;width:36px;height:36px;z-index:40;cursor:pointer;
  background:linear-gradient(135deg,transparent 50%,rgba(200,160,64,0.2) 50%);
  border-radius:0 0 12px 0;
  transition:all 0.2s;
}
.corner-hint:hover{background:linear-gradient(135deg,transparent 50%,rgba(200,160,64,0.4) 50%);}

@media(max-width:900px){
  .book-wrap,.book,.spread{width:100vw;height:auto;min-height:400px;}
  .page-left,.page-right{width:50%;}
  .page-inner{padding:24px 20px;}
  .cover-main-title{font-size:18px;}
}
</style>
</head>

    <div style="font-size:11px;color:#a0916e;line-height:1.8;text-align:right;">
      <p>이 책에 담긴 모든 프롬프트와</p>
      <p>방법론은 실제로 사용된 것입니다.</p>
      <br>
      <p style="color:#c8a040;font-weight:700;">cloid.ai</p>
      <p>2026년 제작</p>
    </div>
  </div>`
}

]; // end spreads

// ─── ENGINE ───────────────────────────────────────────────────
let current = 0;
let animating = false;

const leftPage = document.getElementById('leftPage');
const rightBg   = document.getElementById('rightBg');
const flipLayer = document.getElementById('flipLayer');
const flipFront = document.getElementById('flipFront');
const flipBack  = document.getElementById('flipBack');
const prevBtn   = document.getElementById('prevBtn');
const nextBtn   = document.getElementById('nextBtn');
const spreadEl  = document.getElementById('spreadEl');
const spreadNum = document.getElementById('spreadNum');
const spreadTit = document.getElementById('spreadTitle');
const cornerHint= document.getElementById('cornerHint');

function getPageContent(index, side) {
  const s = spreads[index];
  if (!s) return '';
  if (s.type === 'cover' || s.type === 'back') return side === 'left' ? s.left : s.right;
  return side === 'left' ? s.left : s.right;
}

function isCoverType(index) {
  return spreads[index] && (spreads[index].type === 'cover' || spreads[index].type === 'back');
}

function render(animate, direction) {
  const s = spreads[current];

  // Update info
  spreadNum.textContent = `${current + 1} / ${spreads.length}`;
  spreadTit.textContent = s.title;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === spreads.length - 1;

  if (!animate) {
    leftPage.innerHTML  = getPageContent(current, 'left');
    rightBg.innerHTML   = getPageContent(current, 'right');
    flipLayer.style.transform = 'rotateY(0deg)';
    flipLayer.style.transition = 'none';
    flipFront.innerHTML = '';
    flipBack.innerHTML  = '';
    return;
  }

  // Animate forward
  if (direction === 'forward') {
    const prev = current - 1;
    flipFront.innerHTML = getPageContent(prev, 'right');
    flipBack.innerHTML  = getPageContent(current, 'left');
    rightBg.innerHTML   = getPageContent(current, 'right');

    flipLayer.style.transition = 'none';
    flipLayer.style.transform  = 'rotateY(0deg)';
    flipLayer.offsetHeight; // reflow

    flipLayer.style.transition = 'transform 0.85s cubic-bezier(0.645,0.045,0.355,1)';
    flipLayer.style.transform  = 'rotateY(-180deg)';

    setTimeout(() => {
      leftPage.innerHTML = getPageContent(current, 'left');
      flipLayer.style.transition = 'none';
      flipLayer.style.transform  = 'rotateY(0deg)';
      flipFront.innerHTML = '';
      flipBack.innerHTML  = '';
      animating = false;
    }, 860);
  }
  // Animate backward
  else {
    const next = current + 1;
    flipBack.innerHTML  = getPageContent(current, 'right');
    flipFront.innerHTML = getPageContent(next, 'left');
    leftPage.innerHTML  = getPageContent(current, 'left');
    rightBg.innerHTML   = getPageContent(current, 'right');

    flipLayer.style.transition = 'none';
    flipLayer.style.transform  = 'rotateY(-180deg)';
    flipLayer.offsetHeight;

    flipLayer.style.transition = 'transform 0.85s cubic-bezier(0.645,0.045,0.355,1)';
    flipLayer.style.transform  = 'rotateY(0deg)';

    setTimeout(() => {
      rightBg.innerHTML   = getPageContent(current, 'right');
      flipFront.innerHTML = '';
      flipBack.innerHTML  = '';
      animating = false;
    }, 860);
  }
}

function goNext() {
  if (animating || current >= spreads.length - 1) return;
  animating = true;
  current++;
  render(true, 'forward');
}

function goPrev() {
  if (animating || current <= 0) return;
  animating = true;
  current--;
  render(true, 'backward');
}

nextBtn.addEventListener('click', goNext);
prevBtn.addEventListener('click', goPrev);
cornerHint.addEventListener('click', goNext);

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});

// Touch swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { dx < 0 ? goNext() : goPrev(); }
}, {passive:true});

// Init
render(false);
</script>
</body>
</html>
