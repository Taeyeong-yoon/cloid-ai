name: Weekly AI Content Generator

on:
  schedule:
    # 매주 월요일 09:00 KST = 월요일 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly content
        run: npm run weekly:content
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add content/skills/ content/labs/

          if git diff --staged --quiet; then
            echo "생성된 새 콘텐츠 없음 — 커밋 스킵"
            exit 0
          fi

          WEEK=$(date '+%Y-W%V')
          git commit -m "feat: weekly AI content auto-generated ($WEEK)"
          git push
