name: Daily Content Update

on:
  schedule:
    # 매일 09:00 KST = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update Radar content
        run: npm run radar:update
        env:
          NODE_ENV: production
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Update Learning content
        run: npm run learning:update
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add content/

          # 변경사항 없으면 커밋 스킵
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 스킵"
            exit 0
          fi

          DATE=$(date '+%Y-%m-%d')
          git commit -m "chore: daily content update ($DATE)"
          git push

          # 추후 PR 방식으로 변경하려면 아래 주석 해제 후 위 push 제거:
          # gh pr create --title "chore: daily content update ($DATE)" \
          #   --body "자동 갱신 PR" --base main --head "content-update-$DATE"
